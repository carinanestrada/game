<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles/styles.css" rel="stylesheet" />

    <title>Home</title>
</head>

<body>
    <h1>Welcome to the chicken race!</h1>
    <h2>Click the button to move your race chicken below and try to cross the road first to win!</h2>


    <div class="container game-container">
        <p>Clicks: <span id="click-count">0</span></p>
        <button class="btn" id="click-button">Press me!</button>
    </div>

    <div class="race">
        <div class="race-row">
            <img id="chicken1" class="racing-chicken racing-chicken1" src="images/chkn2.png" alt="chicken picture">
        </div>
        <div class="race-row">
            <img id="chicken2" class="racing-chicken racing-chicken2" src="images/chkn3.png" alt="chicken picture">
        </div>
        <img id="finish-line" class="line" src="images/rd-finish-line.png" alt="finish road">
    </div>

    <!-- have atleast 1 module export? -->
    <script src="scripts/js1.js"></script>
</body>

</html>
